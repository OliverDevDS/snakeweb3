<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Web3 Robinhood</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>SNAKE WEB3 🐍</h1>

    <div id="authSection">
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        <div id="walletInfo" style="display:none;">
            <span id="walletAddr"></span> | <span id="playerName"></span>
        </div>
    </div>

    <div id="nicknameModal" style="display:none; margin: 20px auto; width: 300px; border: 1px solid #0f0; padding: 10px;">
        <input type="text" id="nickInput" placeholder="Choose a nickname">
        <button onclick="saveNickname()">Register</button>
    </div>

    <div class="main-container">
        <div class="leaderboard-area">
            <h3>🏆 Ranking</h3>
            <ul id="leaderboardList"></ul>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <p>Score: <span id="score">0</span></p>
            <button onclick="restartGame()">Restart</button>
        </div>

       <div class="roulette-area">
    <h3>🎰 Roulette</h3>
    <button id="spinBtn" onclick="spinWheel(event)">Spin</button> 
    <p>Steps: <span id="steps">0</span></p>
   </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
    <script src="web3.js"></script>
    <script src="game.js"></script>
</body>
</html>
